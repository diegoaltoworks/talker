name: Publish to NPM

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'bun.lockb'
      - 'bun.lock'
      - '.github/workflows/npm-publish.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' && github.actor != 'dependabot[bot]'

    permissions:
      contents: write
      id-token: write

    env:
      NODE_VERSION: 24.x

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run linting
        run: bun run lint

      - name: Run type check
        run: bun run typecheck

      - name: Run security audit
        run: bun run security:check

      - name: Run tests
        run: bun test

      - name: Build package
        run: bun run build

      - name: Bump minor version
        id: bump
        run: |
          git fetch --tags --force
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -n "$LATEST_TAG" ]; then
            BASE_VERSION="${LATEST_TAG#v}"
          else
            BASE_VERSION=$(node -p "require('./package.json').version")
          fi
          NEW_VERSION=$(node -e "const [major, minor] = process.argv[1].split('.').map(Number); console.log(major + '.' + (minor + 1) + '.0')" "$BASE_VERSION")
          while git rev-parse --verify --quiet "refs/tags/v${NEW_VERSION}" >/dev/null; do
            NEW_VERSION=$(node -e "const [major, minor] = process.argv[1].split('.').map(Number); console.log(major + '.' + (minor + 1) + '.0')" "$NEW_VERSION")
          done
          npm version "$NEW_VERSION" --no-git-tag-version >/dev/null
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and tag version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Publish to NPM
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
